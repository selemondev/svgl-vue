name: Auto-merge svgl PRs
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  guard:
    if: startsWith(github.head_ref, 'update-svgl-vue-components') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR only touches allowed paths
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "Files changed in this PR:"
          echo "$CHANGED"
          echo ""
          BAD=$(echo "$CHANGED" | grep -v '^src/components/.*\.vue$' || true)
          if [ -n "$BAD" ]; then
            echo "❌ PR touches files outside src/components/*.vue:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ All changes confined to src/components/*.vue"

  merge:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
